name: "DevOps End-to-End Practice"
on:
  push:
    branches:
      - main
  workflow_dispatch:
    # Creamos un menú desplegable con un parámetro por demanda
    inputs:
      action:
        description: 'Elige la acción a ejecutar (deploy o destroy)'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    name: "Deploy Infrastructure and Apps"
    if: "${{ github.event.inputs.action == 'deploy' || github.event_name == 'push' }}"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Código
      uses: actions/checkout@v3

    # Generamos llaves SSH en el runner para que Terraform las inyecte en la VM
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
        cat ~/.ssh/id_rsa.pub

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    
    - name: 🔍 AUDITORÍA DE LLAVES (TEMPORAL)
      run: |
        echo "=== LLAVE PÚBLICA EN BASE64 ==="
        echo "${{ secrets.SSH_PUBLIC_KEY }}" | base64
        
        echo "=== LLAVE PRIVADA (Primeras líneas modificadas) ==="
        # Reemplazamos los guiones para engañar al filtro de GitHub y ver el texto real
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | sed 's/-/=/g' | head -n 5

    - name: Terraform Init
      id: tf
      run: |
        cd terraform
        terraform init
        echo "terraform init realizado"

    - name: Terraform Apply
      id: tf_apply
      run: |
        cd terraform
        terraform apply -auto-approve -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
    - name: Extraer y Guardar IP Limpia para Ansible
      run: |
        # Ejecutamos el comando enviando cualquier log residual de debug a la basura (2>/dev/null)
        VM_IP=$(terraform -chdir=terraform output -raw vm_public_ip 2>/dev/null | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | head -n 1)
        CLEAN_IP=$(echo "$VM_IP" | tr -d '\r\n[:space:]')
        
        # Escribimos usando la sintaxis heredada segura para evitar bloqueos de formato
        echo "VM_PUBLIC_IP=${CLEAN_IP}" >> "$GITHUB_ENV"

    - name: Verificar IP en el siguiente paso
      run: |
        echo "La IP guardada con éxito es: ${{ env.VM_PUBLIC_IP }}"

    # Esperamos a que la VM termine de arrancar el puerto 22 antes de lanzar Ansible
    - name: Wait for SSH to be ready
      run: |
        # CORREGIDO: Ahora usa env.VM_PUBLIC_IP
        echo "Esperando que la IP ${{ env.VM_PUBLIC_IP }} responda..."
        sleep 30

    - name: Run Ansible Playbook
      run: |
        cd ansible
        ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i "${{ env.VM_PUBLIC_IP }}," -u azureuser --private-key ~/.ssh/id_rsa playbook.yml

  destroy:
    name: "Destroy Infrastructure"
    if: "${{ github.event.inputs.action == 'destroy' }}"
    runs-on: ubuntu-latest    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Destroy
        run: |
          cd terraform
          # Ejecuta el destroy inyectando la variable para que no pida confirmación ni falle por la llave
          terraform destroy -auto-approve -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"