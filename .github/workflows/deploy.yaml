name: "DevOps End-to-End Practice"

on:
  push:
    branches:
      - master
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
    - name: Checkout Código
      uses: actions/checkout@v3

    # Generamos llaves SSH en el runner para que Terraform las inyecte en la VM
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
        cat ~/.ssh/id_rsa.pub

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      id: tf
      run: |
        cd terraform
        terraform init
        echo "terraform init realizado"

    - name: Terraform Apply
      id: tf_apply
      run: |
        cd terraform
        terraform apply -auto-approve -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
    - name: Extraer y Guardar IP Limpia para Ansible
      run: |
        # Ejecutamos el comando enviando cualquier log residual de debug a la basura (2>/dev/null)
        RAW_IP=$(terraform -chdir=terraform output -raw vm_public_ip 2>/dev/null | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' || true)
        
        # Limpiamos cualquier salto de línea invisible que Bash pueda arrastrar
        CLEAN_IP=$(echo "$RAW_IP" | tr -d '\r\n[:space:]')
        
        # Escribimos usando la sintaxis heredada segura para evitar bloqueos de formato
        echo "VM_PUBLIC_IP=${CLEAN_IP}" >> "$GITHUB_ENV"

    - name: Verificar IP en el siguiente paso
      run: |
        echo "La IP guardada con éxito es: ${{ env.VM_PUBLIC_IP }}"

    # Esperamos a que la VM termine de arrancar el puerto 22 antes de lanzar Ansible
    - name: Wait for SSH to be ready
      run: |
        # CORREGIDO: Ahora usa env.VM_PUBLIC_IP
        echo "Esperando que la IP ${{ env.VM_PUBLIC_IP }} responda..."
        sleep 30

    - name: Run Ansible Playbook
      run: |
        cd ansible
        # CORREGIDO: Ahora usa env.VM_PUBLIC_IP
        # Ejecutamos ansible pasando la IP dinámicamente en el inventario inline
        ansible-playbook -i "${{ env.VM_PUBLIC_IP }}," -u azureuser --private-key ~/.ssh/id_rsa playbook.yml
